services:
  hw02-fastapi:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: hw02-fastapi-serving

    env_file:
      - .env

    ports:
      - "8001:8000"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s