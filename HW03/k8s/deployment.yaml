apiVersion: apps/v1
kind: Deployment
metadata:
  name: airbnb-serving-deployment
  labels:
    app: airbnb-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: airbnb-serving
  template:
    metadata:
      labels:
        app: airbnb-serving
    spec:
      containers:
        - name: airbnb-serving-api
          image: airbnb-serving:optimized
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://185.50.38.163:33014"

            - name: MLFLOW_EXPERIMENT_NAME
              value: "qbc12_hw02_student_alireza_abouei"

            - name: MLFLOW_RUN_ID
              value: "2f4885cc6b2b42baa62c279937ea4401"

            - name: MODEL_URI
              value: "runs:/2f4885cc6b2b42baa62c279937ea4401/model"

            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mlflow-credentials
                  key: username
                  optional: true

            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-credentials
                  key: password
                  optional: true

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
