# main service, reachable at http://185.50.38.163:30097
# selector points at blue. for the cutover, patch it to track: green:
#   kubectl patch service embedder -p '{"spec":{"selector":{"app":"embedder","track":"green"}}}'
apiVersion: v1
kind: Service
metadata:
  name: embedder
  namespace: qbc12-hw03-c-alireza-abouei
  labels: {app: embedder}
spec:
  type: NodePort
  selector:
    app: embedder
    track: blue
  ports:
  - name: http
    port: 80
    targetPort: http
    nodePort: 30097
    protocol: TCP
