# cpu autoscaler 1-3 replicas, needs metrics-server + cpu request on the pod
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: embedder-hpa
  namespace: qbc12-hw03-c-alireza-abouei
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: embedder
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
